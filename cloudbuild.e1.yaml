steps:
  # Build Docker image (same Dockerfile, different image tag)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/remember-rest-service-e1:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/remember-rest-service-e1:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/remember-rest-service-e1:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/remember-rest-service-e1:latest'

  # Deploy to Cloud Run (separate service from production)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'remember-rest-service-e1'
      - '--image=gcr.io/$PROJECT_ID/remember-rest-service-e1:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60s'
      - '--set-env-vars=NODE_ENV=production,LOG_LEVEL=debug'
      - '--update-secrets=PLATFORM_SERVICE_TOKEN=remember-e1-platform-service-token:latest,CORS_ORIGIN=remember-e1-cors-origin:latest,WEAVIATE_REST_URL=remember-e1-weaviate-rest-url:latest,WEAVIATE_GRPC_URL=remember-e1-weaviate-grpc-url:latest,WEAVIATE_API_KEY=remember-e1-weaviate-api-key:latest,FIREBASE_ADMIN_SERVICE_ACCOUNT_KEY=remember-e1-firebase-admin-service-account-key:latest,FIREBASE_PROJECT_ID=remember-e1-firebase-project-id:latest,EMBEDDINGS_API_KEY=remember-e1-openai-embeddings-api-key:latest,EMBEDDINGS_PROVIDER=remember-e1-embeddings-provider:latest,EMBEDDINGS_MODEL=remember-e1-embeddings-model:latest,AWS_ACCESS_KEY_ID=remember-e1-aws-access-key-id:latest,AWS_SECRET_ACCESS_KEY=remember-e1-aws-secret-access-key:latest,AWS_REGION=remember-e1-aws-region:latest,BEDROCK_MODEL_ID=remember-e1-bedrock-model-id:latest,ANTHROPIC_API_KEY=remember-anthropic-api-key:latest,GCP_DOC_AI_SERVICE_ACCOUNT_KEY=remember-doc-ai-service-account-key:latest,DOCUMENT_AI_PROCESSOR_ID=remember-doc-ai-processor-id:latest,REMEMBER_WEBHOOK_URL=remember-e1-webhook-url:latest,REMEMBER_WEBHOOK_SECRET=remember-e1-webhook-secret:latest,SCHEDULER_SECRET=remember-e1-scheduler-secret:latest'

images:
  - 'gcr.io/$PROJECT_ID/remember-rest-service-e1:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/remember-rest-service-e1:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
