steps:
  # Build Docker image using Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/remember-rest-service:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/remember-rest-service:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/remember-rest-service:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/remember-rest-service:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'remember-rest-service'
      - '--image=gcr.io/$PROJECT_ID/remember-rest-service:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60s'
      - '--set-env-vars=NODE_ENV=production'
      - '--update-secrets=PLATFORM_SERVICE_TOKEN=remember-rest-platform-service-token:latest,CORS_ORIGIN=remember-rest-cors-origin:latest,WEAVIATE_REST_URL=remember-rest-weaviate-rest-url:latest,WEAVIATE_GRPC_URL=remember-rest-weaviate-grpc-url:latest,WEAVIATE_API_KEY=remember-rest-weaviate-api-key:latest,FIREBASE_ADMIN_SERVICE_ACCOUNT_KEY=remember-rest-firebase-admin-service-account-key:latest,FIREBASE_PROJECT_ID=remember-rest-firebase-project-id:latest,EMBEDDINGS_API_KEY=remember-rest-embeddings-api-key:latest,EMBEDDINGS_PROVIDER=remember-rest-embeddings-provider:latest,EMBEDDINGS_MODEL=remember-rest-embeddings-model:latest,AWS_ACCESS_KEY_ID=remember-rest-aws-access-key-id:latest,AWS_SECRET_ACCESS_KEY=remember-rest-aws-secret-access-key:latest,AWS_REGION=remember-rest-aws-region:latest,BEDROCK_MODEL_ID=remember-rest-bedrock-model-id:latest'

images:
  - 'gcr.io/$PROJECT_ID/remember-rest-service:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/remember-rest-service:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
